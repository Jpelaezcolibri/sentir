<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <radialGradient id="bg" cx="40%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#7EC8C0"/>
      <stop offset="100%" stop-color="#5AADA3"/>
    </radialGradient>
    <clipPath id="circle">
      <circle cx="100" cy="100" r="98"/>
    </clipPath>
  </defs>

  <!-- Fondo circular con gradiente -->
  <circle cx="100" cy="100" r="98" fill="url(#bg)"/>

  <!-- Borde blanco sutil -->
  <circle cx="100" cy="100" r="96" fill="none" stroke="rgba(255,255,255,0.35)" stroke-width="1.5"/>

  <!-- Diseño botánico: hoja central -->
  <g clip-path="url(#circle)" transform="translate(100,88)">
    <!-- Hoja izquierda -->
    <path d="M0,0 C-8,-18 -22,-28 -18,-42 C-10,-30 -4,-18 0,0Z"
          fill="white" opacity="0.92" transform="rotate(-25) translate(-2,-4)"/>
    <!-- Hoja derecha -->
    <path d="M0,0 C8,-18 22,-28 18,-42 C10,-30 4,-18 0,0Z"
          fill="white" opacity="0.92" transform="rotate(25) translate(2,-4)"/>
    <!-- Hoja central (más grande) -->
    <path d="M0,4 C-6,-12 -8,-30 0,-46 C8,-30 6,-12 0,4Z"
          fill="white" opacity="0.97"/>

    <!-- Tallo -->
    <line x1="0" y1="4" x2="0" y2="18" stroke="white" stroke-width="1.5" stroke-linecap="round" opacity="0.85"/>

    <!-- Espiral/caracol a la izquierda -->
    <path d="M0,16 C-6,14 -14,16 -16,22 C-18,28 -14,34 -8,34 C-4,34 -1,31 -2,28"
          fill="none" stroke="white" stroke-width="1.4" stroke-linecap="round" opacity="0.8"/>

    <!-- Puntos decorativos -->
    <circle cx="6" cy="20" r="1.2" fill="white" opacity="0.7"/>
    <circle cx="9" cy="23" r="0.9" fill="white" opacity="0.55"/>
  </g>

  <!-- Texto "sentir" -->
  <text
    x="100" y="148"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="24"
    font-style="italic"
    font-weight="400"
    fill="white"
    text-anchor="middle"
    letter-spacing="2"
    opacity="0.97"
  >sentir</text>
</svg>
